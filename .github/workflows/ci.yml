name: CI

on:
  pull_request:
    branches:
      - main
      - 'feature/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format (check)
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Seed (idempotent)
        run: |
          SQLITE_PATH=/tmp/agent-ci.sqlite pnpm run seed
          SQLITE_PATH=/tmp/agent-ci.sqlite pnpm run seed

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: agent-platform-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Prepare workspace storage
        run: make workspace-init

      - name: Start API + web (compose profile services)
        run: docker compose --profile services up -d --build

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -fsS --max-time 2 http://127.0.0.1:3000/health >/dev/null; then
              echo "api ready"
              exit 0
            fi
            sleep 2
          done
          echo "api did not become ready"
          docker compose --profile services ps
          exit 1

      - name: Wait for web
        run: |
          for i in $(seq 1 60); do
            if curl -fsS --max-time 2 http://127.0.0.1:3001/ >/dev/null; then
              echo "web ready"
              exit 0
            fi
            sleep 2
          done
          echo "web did not become ready"
          docker compose --profile services ps
          exit 1

      - name: E2E seed (default + specialist/MCP/skill)
        run: docker compose exec -T --env E2E_SEED=1 api node packages/db/dist/seed/run.js

      - name: E2E tests
        env:
          BASE_URL: http://127.0.0.1:3001
          API_URL: http://127.0.0.1:3000
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Collect docker logs
        if: failure()
        run: |
          docker compose --profile services ps > docker-compose-ps.txt || true
          docker compose logs --no-color api > api-logs.txt || true

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docker-logs
          path: |
            docker-compose-ps.txt
            api-logs.txt

      - name: Stop compose
        if: always()
        run: docker compose --profile services down -v
