name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "task/**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format (check)
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Seed (idempotent)
        run: |
          SQLITE_PATH=/tmp/agent-ci.sqlite pnpm run seed
          SQLITE_PATH=/tmp/agent-ci.sqlite pnpm run seed

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: agent-platform-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Start API + web (compose profile services)
        run: docker compose --profile services up -d --build

      - name: Wait for web
        run: |
          for i in $(seq 1 60); do
            if curl -fsS --max-time 2 http://127.0.0.1:3001/ >/dev/null; then
              echo "web ready"
              exit 0
            fi
            sleep 2
          done
          echo "web did not become ready"
          docker compose --profile services ps
          exit 1

      - name: E2E seed (default + specialist/MCP/skill)
        run: docker compose exec -T api sh -c 'E2E_SEED=1 SQLITE_PATH=/data/agent.sqlite node packages/db/dist/seed/run.js'

      - name: E2E tests
        env:
          BASE_URL: http://127.0.0.1:3001
          API_URL: http://127.0.0.1:3000
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Stop compose
        if: always()
        run: docker compose --profile services down -v
