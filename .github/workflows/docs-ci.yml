name: docs-ci

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'docs/**'
      - '.markdownlint-cli2.jsonc'
      - 'lychee.toml'
      - '.github/workflows/docs-ci.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - 'docs/**'
      - '.markdownlint-cli2.jsonc'
      - 'lychee.toml'
      - '.github/workflows/docs-ci.yml'

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run markdownlint-cli2
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#**/node_modules" "#dist" "#**/dist" "#.next" "#**/.next" "#coverage" "#**/coverage" "#test-results" "#data" "#packages/db/drizzle"

  links:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: |
            lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config lychee.toml
            --no-progress
            --base .
            "**/*.md"
          fail: true
