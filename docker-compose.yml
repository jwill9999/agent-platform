services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      # SQLite file path inside the container; persisted on named volume below.
      SQLITE_PATH: "/data/agent.sqlite"
      # Base64-encoded 32-byte key for AES-256-GCM secret storage (required when writing secrets).
      # SECRETS_MASTER_KEY: ""
    volumes:
      - sqlite_data:/data
      # E2E filesystem MCP seed expects a mount at /workspace (see packages/db e2e seed).
      - e2e_workspace:/workspace:rw
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  web:
    profiles: ["services"]
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "${WEB_HOST_PORT:-3001}:3001"
    environment:
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
      API_PROXY_URL: "http://api:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  sqlite_data:
  e2e_workspace:
