openapi: '3.0.3'
info:
  title: Agent Platform API
  description: |
    REST JSON API for the Agent Platform — manages agents, skills, tools,
    MCP servers, sessions, and streaming chat execution.

    **Error shape** (all non-2xx responses):
    ```json
    { "error": { "code": "ERROR_CODE", "message": "Human-readable message", "details": {} } }
    ```
  version: 1.0.0
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: health
    description: Liveness / readiness probe
  - name: agents
    description: |
      Agent CRUD. Display name and settings are editable; each agent’s `slug` is set at
      create time and never changes (stable URLs and lookups).
  - name: skills
    description: Skill CRUD
  - name: tools
    description: Tool CRUD
  - name: mcp-servers
    description: MCP Server CRUD
  - name: sessions
    description: Session CRUD
  - name: chat
    description: Streaming agent chat execution
  - name: settings
    description: Platform settings (rate limits, cost budgets)
  - name: approval-requests
    description: Human approval request workflow

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  # ── Health ────────────────────────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      summary: Liveness check
      description: Fast liveness probe for load balancers and orchestrators.
      tags: [health]
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /health/ready:
    get:
      operationId: getReadiness
      summary: Deep readiness check
      description: |
        Verifies all critical subsystems: database connectivity, disk
        writability, and free space. Returns per-subsystem status with
        latency measurements.

        - **200** — healthy or degraded (non-critical issue)
        - **503** — unhealthy (critical subsystem failure)
      tags: [health]
      responses:
        '200':
          description: Healthy or degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Unhealthy — critical subsystem failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'

  # ── Agents ───────────────────────────────────────────────────────────────
  /v1/agents:
    get:
      operationId: listAgents
      summary: List all agents
      tags: [agents]
      responses:
        '200':
          description: Array of agents
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Agent'
    post:
      operationId: createAgent
      summary: Create an agent
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreateBody'
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Agent'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/agents/{idOrSlug}:
    parameters:
      - $ref: '#/components/parameters/IdOrSlug'
    get:
      operationId: getAgent
      summary: Get agent by ID
      tags: [agents]
      responses:
        '200':
          description: Agent found
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Agent'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateAgent
      summary: Update agent
      description: |
        Replace agent fields. `id` and `slug` are taken from the path (`idOrSlug` resolves
        to the existing row); the body matches `AgentCreateBody` (same shape as POST /v1/agents).
        You may change the display name and other profile fields; **`slug` is immutable** for
        the lifetime of the agent (the server always keeps the stored slug).
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreateBody'
      responses:
        '200':
          description: Agent updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Agent'
        '400':
          $ref: '#/components/responses/ValidationError'
    delete:
      operationId: deleteAgent
      summary: Delete agent
      tags: [agents]
      responses:
        '204':
          description: Agent deleted
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Skills ───────────────────────────────────────────────────────────────
  /v1/skills:
    get:
      operationId: listSkills
      summary: List all skills
      tags: [skills]
      responses:
        '200':
          description: Array of skills
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Skill'
    post:
      operationId: createSkill
      summary: Create a skill
      tags: [skills]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillCreateBody'
      responses:
        '201':
          description: Skill created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Skill'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/skills/{idOrSlug}:
    parameters:
      - $ref: '#/components/parameters/IdOrSlug'
    get:
      operationId: getSkill
      summary: Get skill by ID
      tags: [skills]
      responses:
        '200':
          description: Skill found
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Skill'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateSkill
      summary: Update skill
      tags: [skills]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Skill'
      responses:
        '200':
          description: Skill updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Skill'
        '400':
          $ref: '#/components/responses/ValidationError'
    delete:
      operationId: deleteSkill
      summary: Delete skill
      tags: [skills]
      responses:
        '204':
          description: Skill deleted
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Tools ────────────────────────────────────────────────────────────────
  /v1/tools:
    get:
      operationId: listTools
      summary: List all tools
      tags: [tools]
      responses:
        '200':
          description: Array of tools
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tool'
    post:
      operationId: createTool
      summary: Create a tool
      tags: [tools]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolCreateBody'
      responses:
        '201':
          description: Tool created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Tool'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/tools/{idOrSlug}:
    parameters:
      - $ref: '#/components/parameters/IdOrSlug'
    get:
      operationId: getTool
      summary: Get tool by ID
      tags: [tools]
      responses:
        '200':
          description: Tool found
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Tool'
        '409':
          $ref: '#/components/responses/Conflict'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateTool
      summary: Update tool
      tags: [tools]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolCreateBody'
      responses:
        '200':
          description: Tool updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Tool'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      operationId: deleteTool
      summary: Delete tool
      tags: [tools]
      responses:
        '204':
          description: Tool deleted
        '404':
          $ref: '#/components/responses/NotFound'

  # ── MCP Servers ──────────────────────────────────────────────────────────
  /v1/mcp-servers:
    get:
      operationId: listMcpServers
      summary: List all MCP servers
      tags: [mcp-servers]
      responses:
        '200':
          description: Array of MCP servers
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/McpServer'
    post:
      operationId: createMcpServer
      summary: Create an MCP server
      tags: [mcp-servers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpServerCreateBody'
      responses:
        '201':
          description: MCP server created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/McpServer'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/mcp-servers/{idOrSlug}:
    parameters:
      - $ref: '#/components/parameters/IdOrSlug'
    get:
      operationId: getMcpServer
      summary: Get MCP server by ID
      tags: [mcp-servers]
      responses:
        '200':
          description: MCP server found
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/McpServer'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateMcpServer
      summary: Update MCP server
      tags: [mcp-servers]
      requestBody:
        required: true
        description: |
          Same shape as POST create; `id` and `slug` come from the existing server (URL), not the body.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpServerCreateBody'
      responses:
        '200':
          description: MCP server updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/McpServer'
        '400':
          $ref: '#/components/responses/ValidationError'
    delete:
      operationId: deleteMcpServer
      summary: Delete MCP server
      tags: [mcp-servers]
      responses:
        '204':
          description: MCP server deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/mcp-servers/{idOrSlug}/test:
    parameters:
      - $ref: '#/components/parameters/IdOrSlug'
    post:
      operationId: testMcpServer
      summary: Test MCP server connectivity
      description: |
        Opens a real MCP session, lists available tools, then closes.
        Returns connection status, discovered tools, and latency.
      tags: [mcp-servers]
      responses:
        '200':
          description: Test result (status may be "ok" or "error")
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/McpServerTestResult'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Sessions ─────────────────────────────────────────────────────────────
  /v1/sessions:
    get:
      operationId: listSessions
      summary: List sessions
      tags: [sessions]
      parameters:
        - name: agentId
          in: query
          required: false
          description: Filter sessions by agent ID
          schema:
            type: string
      responses:
        '200':
          description: Array of sessions
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionRecord'
    post:
      operationId: createSession
      summary: Create a session
      tags: [sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreateBody'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/SessionRecord'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/sessions/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: getSession
      summary: Get session by ID
      tags: [sessions]
      responses:
        '200':
          description: Session found
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/SessionRecord'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateSession
      summary: Update session
      tags: [sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionRecord'
      responses:
        '200':
          description: Session updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/SessionRecord'
        '400':
          $ref: '#/components/responses/ValidationError'
    delete:
      operationId: deleteSession
      summary: Delete session
      tags: [sessions]
      responses:
        '204':
          description: Session deleted
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Chat ─────────────────────────────────────────────────────────────────
  /v1/chat:
    post:
      operationId: chatStream
      summary: Stream agent chat execution
      description: |
        Sends a user message within a session and streams back NDJSON events
        as the agent reasons, calls tools, and produces output.

        Response is `application/x-ndjson` — one JSON object per line.
      tags: [chat]
      parameters:
        - name: x-openai-key
          in: header
          required: false
          description: Override API key for LLM provider
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: NDJSON stream of output events
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/OutputEvent'
          headers:
            x-correlation-id:
              schema:
                type: string
              description: Request correlation ID
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Session is currently processing another request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: SESSION_BUSY
                  message: Session is currently processing another request

  # ── Settings ─────────────────────────────────────────────────────────────
  /v1/settings:
    get:
      operationId: getSettings
      summary: Get platform settings
      tags: [settings]
      responses:
        '200':
          description: Current platform settings
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/PlatformSettings'
    put:
      operationId: updateSettings
      summary: Update platform settings
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformSettingsUpdate'
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/PlatformSettings'
        '400':
          $ref: '#/components/responses/ValidationError'
    delete:
      operationId: resetSettings
      summary: Reset settings to defaults
      tags: [settings]
      responses:
        '200':
          description: Default settings restored
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/PlatformSettings'

  # ── Approval Requests ───────────────────────────────────────────────────
  /v1/approval-requests:
    get:
      operationId: listApprovalRequests
      summary: List approval requests
      tags: [approval-requests]
      parameters:
        - name: sessionId
          in: query
          schema:
            type: string
        - name: runId
          in: query
          schema:
            type: string
        - name: agentId
          in: query
          schema:
            type: string
        - name: toolName
          in: query
          schema:
            type: string
        - name: riskTier
          in: query
          schema:
            $ref: '#/components/schemas/RiskTier'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ApprovalRequestStatus'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Matching approval requests
          content:
            application/json:
              schema:
                type: object
                required: [data, total, limit, offset]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApprovalRequest'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  /v1/approval-requests/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: getApprovalRequest
      summary: Get approval request by ID
      tags: [approval-requests]
      responses:
        '200':
          description: Approval request found
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/ApprovalRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/approval-requests/{id}/approve:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    post:
      operationId: approveApprovalRequest
      summary: Approve pending approval request
      tags: [approval-requests]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequestDecisionBody'
      responses:
        '200':
          description: Approval request approved
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/ApprovalRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/approval-requests/{id}/reject:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    post:
      operationId: rejectApprovalRequest
      summary: Reject pending approval request
      tags: [approval-requests]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequestDecisionBody'
      responses:
        '200':
          description: Approval request rejected
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/ApprovalRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/approval-requests/{id}/expire:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    post:
      operationId: expireApprovalRequest
      summary: Expire pending approval request
      tags: [approval-requests]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequestDecisionBody'
      responses:
        '200':
          description: Approval request expired
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/ApprovalRequest'
        '409':
          $ref: '#/components/responses/Conflict'

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:
  # ── Parameters ───────────────────────────────────────────────────────────
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: Resource identifier
      schema:
        type: string
        minLength: 1
    IdOrSlug:
      name: idOrSlug
      in: path
      required: true
      description: Resource UUID or slug
      schema:
        type: string
        minLength: 1

  # ── Shared Responses ─────────────────────────────────────────────────────
  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: VALIDATION_ERROR
              message: Invalid request body
              details:
                issues:
                  - path: [name]
                    message: Required
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: NOT_FOUND
              message: Resource not found
    Conflict:
      description: Resource conflict (duplicate ID or FK violation)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: CONFLICT
              message: Resource already exists

  # ── Schemas ──────────────────────────────────────────────────────────────
  schemas:
    # -- Health --
    HealthResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    SubsystemCheck:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        latencyMs:
          type: number
        details:
          type: object
          additionalProperties:
            type: string
        error:
          type: string

    ReadinessResponse:
      type: object
      required: [status, checks, timestamp]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        checks:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SubsystemCheck'
        timestamp:
          type: string
          format: date-time

    # -- Error --
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: VALIDATION_ERROR
            message:
              type: string
              description: Human-readable message
              example: Invalid request body
            details:
              type: object
              description: Additional error context (e.g. Zod issues)

    # -- Agent --
    Agent:
      type: object
      description: |
        Persisted agent. `slug` is assigned at create and never changes; `name` is the
        editable display label.
      required:
        [
          id,
          slug,
          name,
          systemPrompt,
          allowedSkillIds,
          allowedToolIds,
          allowedMcpServerIds,
          executionLimits,
        ]
      properties:
        id:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
          description: Stable identifier for URLs and API lookups; immutable after create.
        name:
          type: string
          minLength: 1
          description: Human-readable label; may be updated without changing `slug`.
        systemPrompt:
          type: string
          minLength: 1
        description:
          type: string
        allowedSkillIds:
          type: array
          items:
            type: string
        allowedToolIds:
          type: array
          items:
            type: string
        allowedMcpServerIds:
          type: array
          items:
            type: string
        executionLimits:
          $ref: '#/components/schemas/ExecutionLimits'
        modelOverride:
          $ref: '#/components/schemas/ModelOverride'
        pluginAllowlist:
          type: array
          items:
            type: string
          nullable: true
        contextWindow:
          $ref: '#/components/schemas/ContextWindow'
        pluginDenylist:
          type: array
          items:
            type: string
          nullable: true

    AgentCreateBody:
      description: |
        Body for POST /v1/agents (create) and PUT /v1/agents/{idOrSlug} (replace). `id` and
        `slug` are system-assigned on create (`slug` is derived from `name`) and are not sent
        in the request body. On replace, `name` and other fields here may change; the stored
        `slug` is never updated from the body.
      type: object
      required:
        [name, systemPrompt, allowedSkillIds, allowedToolIds, allowedMcpServerIds, executionLimits]
      properties:
        name:
          type: string
          minLength: 1
        systemPrompt:
          type: string
          minLength: 1
        description:
          type: string
        allowedSkillIds:
          type: array
          items:
            type: string
        allowedToolIds:
          type: array
          items:
            type: string
        allowedMcpServerIds:
          type: array
          items:
            type: string
        executionLimits:
          $ref: '#/components/schemas/ExecutionLimits'
        modelOverride:
          $ref: '#/components/schemas/ModelOverride'
        pluginAllowlist:
          type: array
          items:
            type: string
          nullable: true
        contextWindow:
          $ref: '#/components/schemas/ContextWindow'
        pluginDenylist:
          type: array
          items:
            type: string
          nullable: true

    ExecutionLimits:
      type: object
      required: [maxSteps, maxParallelTasks, timeoutMs]
      properties:
        maxSteps:
          type: integer
          minimum: 1
        maxParallelTasks:
          type: integer
          minimum: 1
        timeoutMs:
          type: integer
          minimum: 1
        toolTimeoutMs:
          type: integer
          minimum: 1
        maxTokens:
          type: integer
          minimum: 1
        maxCostUnits:
          type: number
          minimum: 0

    ContextWindow:
      type: object
      properties:
        maxInputTokens:
          type: integer
          minimum: 1
          default: 8000
        strategy:
          type: string
          enum: [truncate, summarize]
          default: truncate

    ModelOverride:
      type: object
      required: [provider, model]
      properties:
        provider:
          type: string
          minLength: 1
        model:
          type: string
          minLength: 1

    # -- Skill --
    Skill:
      type: object
      required: [id, slug, name, goal, constraints, tools]
      properties:
        id:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        goal:
          type: string
        constraints:
          type: array
          items:
            type: string
        tools:
          type: array
          items:
            type: string
        outputSchema:
          type: object
          additionalProperties: true
          description: Optional JSON Schema for skill output

    SkillCreateBody:
      description: POST body for creating a skill — id and slug are system-generated.
      type: object
      required: [name, goal, constraints, tools]
      properties:
        name:
          type: string
          minLength: 1
        goal:
          type: string
        constraints:
          type: array
          items:
            type: string
        tools:
          type: array
          items:
            type: string
        outputSchema:
          type: object
          additionalProperties: true
          description: Optional JSON Schema for skill output

    # -- Tool --
    Tool:
      type: object
      required: [id, slug, name]
      properties:
        id:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        description:
          type: string
        config:
          type: object
          description: Arbitrary tool configuration

    ToolCreateBody:
      description: POST body for creating a tool — id and slug are system-generated.
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        config:
          type: object
          description: Arbitrary tool configuration

    # -- MCP Server --
    McpServer:
      type: object
      required: [id, slug, name, transport]
      properties:
        id:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        transport:
          type: string
          minLength: 1
        command:
          type: string
        args:
          type: array
          items:
            type: string
        url:
          type: string
        metadata:
          type: object
          description: Arbitrary metadata

    McpServerCreateBody:
      description: POST body for creating an MCP server — id and slug are system-generated.
      type: object
      required: [name, transport]
      properties:
        name:
          type: string
          minLength: 1
        transport:
          type: string
          minLength: 1
        command:
          type: string
        args:
          type: array
          items:
            type: string
        url:
          type: string
        metadata:
          type: object
          description: Arbitrary metadata

    McpServerTestResult:
      type: object
      required: [status, latencyMs]
      properties:
        status:
          type: string
          enum: [ok, error]
        toolCount:
          type: integer
        tools:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
        error:
          type: string
        latencyMs:
          type: integer

    # -- Session --
    SessionRecord:
      type: object
      required: [id, agentId, createdAtMs, updatedAtMs]
      properties:
        id:
          type: string
          minLength: 1
        agentId:
          type: string
          minLength: 1
        createdAtMs:
          type: integer
          minimum: 0
        updatedAtMs:
          type: integer
          minimum: 0

    SessionCreateBody:
      type: object
      required: [agentId]
      properties:
        agentId:
          type: string
          minLength: 1

    # -- Chat --
    ChatRequest:
      type: object
      required: [sessionId, message]
      properties:
        sessionId:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1

    OutputEvent:
      description: |
        Discriminated union of NDJSON stream events.
        Each line is one of these objects.
      oneOf:
        - $ref: '#/components/schemas/OutputText'
        - $ref: '#/components/schemas/OutputCode'
        - $ref: '#/components/schemas/OutputToolResult'
        - $ref: '#/components/schemas/OutputError'
        - $ref: '#/components/schemas/OutputThinking'
        - $ref: '#/components/schemas/OutputApprovalRequired'
      discriminator:
        propertyName: type
        mapping:
          text: '#/components/schemas/OutputText'
          code: '#/components/schemas/OutputCode'
          tool_result: '#/components/schemas/OutputToolResult'
          error: '#/components/schemas/OutputError'
          thinking: '#/components/schemas/OutputThinking'
          approval_required: '#/components/schemas/OutputApprovalRequired'

    OutputText:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [text]
        content:
          type: string

    OutputCode:
      type: object
      required: [type, language, content]
      properties:
        type:
          type: string
          enum: [code]
        language:
          type: string
        content:
          type: string

    OutputToolResult:
      type: object
      required: [type, toolId, data]
      properties:
        type:
          type: string
          enum: [tool_result]
        toolId:
          type: string
        data: {}

    OutputError:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [error]
        message:
          type: string
        code:
          type: string

    OutputThinking:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [thinking]
        content:
          type: string

    OutputApprovalRequired:
      type: object
      required: [type, approvalRequestId, toolName, argsPreview]
      properties:
        type:
          type: string
          enum: [approval_required]
        approvalRequestId:
          type: string
        toolName:
          type: string
        riskTier:
          $ref: '#/components/schemas/RiskTier'
        argsPreview: {}
        message:
          type: string

    # -- Settings --
    PlatformSettings:
      type: object
      required: [rateLimits, costBudget]
      properties:
        rateLimits:
          type: object
          required: [windowMs, max]
          properties:
            windowMs:
              type: integer
              minimum: 1
              description: Rate limit window in milliseconds
              example: 60000
            max:
              type: integer
              minimum: 1
              description: Maximum requests per window
              example: 100
        costBudget:
          type: object
          required: [globalMaxCostUnits, warnThreshold]
          properties:
            globalMaxCostUnits:
              type: number
              nullable: true
              description: Global cost cap (null = unlimited)
              example: null
            warnThreshold:
              type: number
              minimum: 0
              maximum: 1
              description: Fraction of budget that triggers a warning
              example: 0.8

    PlatformSettingsUpdate:
      type: object
      properties:
        rateLimits:
          type: object
          properties:
            windowMs:
              type: integer
              minimum: 1
            max:
              type: integer
              minimum: 1
        costBudget:
          type: object
          properties:
            globalMaxCostUnits:
              type: number
              nullable: true
            warnThreshold:
              type: number
              minimum: 0
              maximum: 1

    # -- Approval Requests --
    RiskTier:
      type: string
      enum: [zero, low, medium, high, critical]

    ApprovalRequestStatus:
      type: string
      enum: [pending, approved, rejected, expired]

    ApprovalRequest:
      type: object
      required: [id, sessionId, runId, agentId, toolName, argsJson, riskTier, status, createdAtMs]
      properties:
        id:
          type: string
          minLength: 1
        sessionId:
          type: string
          minLength: 1
        runId:
          type: string
          minLength: 1
        agentId:
          type: string
          minLength: 1
        toolName:
          type: string
          minLength: 1
        argsJson:
          type: string
          description: Redacted JSON string of the requested tool arguments.
        executionPayloadJson:
          type: string
          description: Optional serialized payload for later approved execution resume.
        riskTier:
          $ref: '#/components/schemas/RiskTier'
        status:
          $ref: '#/components/schemas/ApprovalRequestStatus'
        createdAtMs:
          type: integer
          minimum: 0
        decidedAtMs:
          type: integer
          minimum: 0
        expiresAtMs:
          type: integer
          minimum: 0
        decisionReason:
          type: string

    ApprovalRequestDecisionBody:
      type: object
      properties:
        reason:
          type: string
          maxLength: 1000
